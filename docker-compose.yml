services:
  php:
    build:
      context: .
      target: php
    container_name: simple-attendance-admin-php
    env_file:
      - .env
    environment:
      - DB_HOST=db
    volumes:
      - storage:/var/www/html/storage
    networks:
      - attendance-network
    restart: unless-stopped

  web:
    build:
      context: .
      target: nginx
    container_name: simple-attendance-admin-nginx
    depends_on:
      - php
    volumes:
      - storage:/var/www/html/storage
    ports:
      - "8181:8181"
    networks:
      - attendance-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: simple-attendance-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-simple_attendance}
      MYSQL_USER: ${DB_USERNAME:-attendance_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      # Mapping to host port 33061 to avoid conflicting with host's 3306
      - "33061:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  attendance-network:
    driver: bridge

volumes:
  db-data:
  storage:
